apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vlfk-no
resources:
  - ../../../base2
commonLabels:
  app.kubernetes.io/name: fint-flyt-value-converting-service
  app.kubernetes.io/instance: fint-flyt-value-converting-service_vlfk-no
  app.kubernetes.io/version: latest
  app.kubernetes.io/component: backend
  app.kubernetes.io/part-of: fint-flyt
  fintlabs.no/team: flyt
  fintlabs.no/org-id: vlfk.no
patches:
  - patch: |-
      - op: replace
        path: "/spec/url/hostname"
        value: "flyt.vigoiks.no"
    target:
      kind: Application
      name: flais-test-fint-flyt-value-converting-service
  - patch: |-
      - op: replace
        path: "/spec/url/basePath"
        value: "/alpha/trondelagfk-no/api/intern/value-convertings"
    target:
      kind: Application
      name: flais-test-fint-flyt-value-converting-service
  - patch: |-
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "trondelag-no.flyt.*"
    target:
      kind: Application
      name: flais-test-fint-flyt-value-converting-service

